kind = "mobile"
previewPath = "/"
title = "Suraksha"
version = "1.0.0"
id = "artifacts/suraksha"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19149

[services.development]
run = "pnpm --filter @workspace/suraksha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/suraksha", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/suraksha", "run", "serve" ]

[services.env]
PORT = "19149"
BASE_PATH = "/"
