<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suraksha – Live Location</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1A0A2E; color: #fff; height: 100dvh; display: flex; flex-direction: column; }
    #header { padding: 14px 18px 10px; background: rgba(124,58,237,0.95); backdrop-filter: blur(8px); z-index: 1000; }
    #header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    #header p { font-size: 12px; opacity: 0.8; margin-top: 3px; }
    #map { flex: 1; }
    #status-bar { padding: 10px 18px; background: rgba(20,10,40,0.95); font-size: 12px; display: flex; align-items: center; gap: 8px; min-height: 40px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #6EE7A8; flex-shrink: 0; animation: pulse 1.5s infinite; }
    .dot.ended { background: #FC8181; animation: none; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    #overlay { position: fixed; inset: 0; background: rgba(20,10,40,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 2000; padding: 24px; text-align: center; }
    #overlay h2 { font-size: 20px; font-weight: 700; }
    #overlay p { font-size: 14px; opacity: 0.75; line-height: 1.5; }
    #overlay.hidden { display: none; }
  </style>
</head>
<body>

<div id="header">
  <h1>🛡 Suraksha – Live Location</h1>
  <p id="header-sub">Connecting…</p>
</div>

<div id="map"></div>

<div id="status-bar">
  <div class="dot" id="dot"></div>
  <span id="status-text">Loading session…</span>
</div>

<div id="overlay">
  <h2 id="overlay-title">Loading…</h2>
  <p id="overlay-body">Please wait while we connect to the live session.</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // Supabase config — anon/public key, protected by RLS
  const SUPABASE_URL = "https://bjeevqilbqxxtdhpvqlw.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_PnC2dB_NfjolJIBNlPPmYw_HDrAHEbV";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Extract share_id from URL path: /live/<share_id>
  const pathParts = window.location.pathname.split("/").filter(Boolean);
  const shareId = pathParts[pathParts.length - 1];

  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlay-title");
  const overlayBody = document.getElementById("overlay-body");
  const statusText = document.getElementById("status-text");
  const dot = document.getElementById("dot");
  const headerSub = document.getElementById("header-sub");

  function showOverlay(title, body) {
    overlayTitle.textContent = title;
    overlayBody.textContent = body;
    overlay.classList.remove("hidden");
  }

  function hideOverlay() {
    overlay.classList.add("hidden");
  }

  function setEnded() {
    dot.classList.add("ended");
    statusText.textContent = "Session ended";
    headerSub.textContent = "This tracking session has ended";
    showOverlay("Session ended", "The person has marked themselves safe or the session has expired.");
  }

  if (!shareId || shareId === "live") {
    showOverlay("Invalid link", "This tracking link is missing a session ID. Please ask the person to share their link again.");
  } else {
    // Init Leaflet map (India center, will move to actual location)
    const map = L.map("map").setView([20.5937, 78.9629], 5);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    const markerIcon = L.divIcon({
      className: "",
      html: `<div style="width:18px;height:18px;background:#7C3AED;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.4)"></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9],
    });

    let marker = null;
    let hasMovedMap = false;

    function updatePosition(lat, lng, accuracy) {
      if (!marker) {
        marker = L.marker([lat, lng], { icon: markerIcon }).addTo(map);
      } else {
        marker.setLatLng([lat, lng]);
      }
      if (!hasMovedMap) {
        map.setView([lat, lng], 16);
        hasMovedMap = true;
      }
      const accText = accuracy ? ` · ±${Math.round(accuracy)}m` : "";
      statusText.textContent = `Last updated: ${new Date().toLocaleTimeString()}${accText}`;
      headerSub.textContent = `Lat ${lat.toFixed(5)}, Lng ${lng.toFixed(5)}`;
    }

    async function loadSession() {
      const { data, error } = await client
        .rpc("get_live_session", { p_share_id: shareId })
        .single();

      if (error || !data) {
        showOverlay("Session not found", "This tracking link may have expired or is invalid. Ask the person to share a new link.");
        return;
      }

      const isExpired = new Date(data.expires_at) < new Date();
      if (!data.is_active || isExpired) {
        updatePosition(data.lat, data.lng, data.accuracy);
        hideOverlay();
        setEnded();
        return;
      }

      updatePosition(data.lat, data.lng, data.accuracy);
      hideOverlay();

      // Subscribe to real-time updates
      client
        .channel(`live-${shareId}`)
        .on(
          "postgres_changes",
          {
            event: "UPDATE",
            schema: "public",
            table: "live_sessions",
            filter: `share_id=eq.${shareId}`,
          },
          (payload) => {
            const row = payload.new;
            if (!row.is_active || new Date(row.expires_at) < new Date()) {
              updatePosition(row.lat, row.lng, row.accuracy);
              setEnded();
              return;
            }
            updatePosition(row.lat, row.lng, row.accuracy);
          }
        )
        .subscribe();
    }

    loadSession();
  }
</script>
</body>
</html>
