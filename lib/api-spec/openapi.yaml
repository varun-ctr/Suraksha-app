openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sakhi
    description: Sakhi AI safety assistant
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /sakhi/chat:
    post:
      operationId: sendSakhiMessage
      tags: [sakhi]
      summary: Chat with Sakhi
      description: Sends the conversation history to the Sakhi AI safety assistant and returns the assistant reply.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SakhiChatRequest"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SakhiChatResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SakhiChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          minLength: 1
          maxLength: 4000
      required:
        - role
        - content
    SakhiChatRequest:
      type: object
      properties:
        messages:
          type: array
          minItems: 1
          maxItems: 30
          items:
            $ref: "#/components/schemas/SakhiChatMessage"
        language:
          type: string
          enum: [en, hi]
      required:
        - messages
    SakhiChatResponse:
      type: object
      properties:
        reply:
          type: string
      required:
        - reply

