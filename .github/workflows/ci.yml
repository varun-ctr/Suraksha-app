name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds composite lib declarations (tsc --build) then typechecks every
      # workspace package under artifacts/ and scripts/.
      - name: Typecheck
        run: pnpm run typecheck

      # Runs the node:test suites in every package that defines a `test`
      # script (api-server safety helpers + zod schemas, suraksha helpers).
      - name: Test
        run: pnpm -r --if-present run test
